name: Release

on:
  push:
    tags: ["v*"]
  # Dry-run: builds all targets and runs gates without publishing.
  # Trigger with: gh workflow run release.yml
  workflow_dispatch:

# Deny-by-default at the top level; every job opts into exactly what it needs.
permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ---------------------------------------------------------------------------
  # 1. Gate: versions must agree and the full build suite must pass, once.
  #    On workflow_dispatch (dry-run) the tag==version assertion is skipped.
  # ---------------------------------------------------------------------------
  check:
    name: Version + gates
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Verify tag == Cargo.toml == all npm package versions
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          # Anchored to start-of-line so "rust-version" / deps can never match.
          cargo_ver="$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          npm_ver="$(node -p "require('./npm/self/package.json').version")"
          echo "tag=${tag}  cargo=${cargo_ver}  npm/self=${npm_ver}"
          if [ "${tag}" != "${cargo_ver}" ]; then
            echo "::error::tag v${tag} != Cargo.toml version ${cargo_ver}"
            exit 1
          fi
          if [ "${tag}" != "${npm_ver}" ]; then
            echo "::error::tag v${tag} != npm/self/package.json version ${npm_ver}"
            exit 1
          fi
          # Verify each of the five platform package.json versions.
          for p in linux-x64 linux-arm64 darwin-x64 darwin-arm64 windows-x64; do
            plat_ver="$(node -p "require('./npm/platforms/${p}/package.json').version")"
            echo "  npm/platforms/${p}=${plat_ver}"
            if [ "${tag}" != "${plat_ver}" ]; then
              echo "::error::tag v${tag} != npm/platforms/${p}/package.json version ${plat_ver}"
              exit 1
            fi
          done
          # Verify the main package's optionalDependencies pins all match the tag.
          node -e "
            const pkg = require('./npm/self/package.json');
            const tag = '${tag}';
            const deps = pkg.optionalDependencies || {};
            let ok = true;
            for (const [name, ver] of Object.entries(deps)) {
              if (ver !== tag) {
                process.stderr.write('::error::optionalDependencies ' + name + ' pinned to ' + ver + ' != ' + tag + '\n');
                ok = false;
              }
            }
            if (!ok) process.exit(1);
            console.log('optionalDependencies pins all match tag ' + tag);
          "

      - name: Format check
        run: cargo fmt --all --check

      - name: Clippy (deny warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Test
        run: cargo test --locked

      - name: Build (release)
        run: cargo build --release --locked

  # ---------------------------------------------------------------------------
  # 2. Build every release target. x86_64-apple-darwin cross-compiles from
  #    macos-latest (arm64); all other legs use native runners.
  #    On workflow_dispatch, the version falls back to the Cargo.toml version
  #    (no tag to strip).
  # ---------------------------------------------------------------------------
  build:
    name: build ${{ matrix.target }}
    needs: check
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ext: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Build (release)
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package archive (unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          # On a tag push GITHUB_REF_NAME is the tag (e.g. v0.1.0); on workflow_dispatch
          # it is the branch name. Fall back to the Cargo.toml version.
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9] ]]; then
            ver="${GITHUB_REF_NAME#v}"
          else
            ver="$(grep -m1 -E '^version[[:space:]]*=' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          fi
          name="self-v${ver}-${{ matrix.target }}"
          mkdir -p "staging/${name}" dist
          cp "target/${{ matrix.target }}/release/self" "staging/${name}/self"
          if [ -f README.md ]; then cp README.md "staging/${name}/"; fi
          if [ -f LICENSE ]; then cp LICENSE "staging/${name}/"; fi
          tar -C staging -czf "dist/${name}.tar.gz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.gz" > "${name}.tar.gz.sha256" )

      - name: Package archive (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          # On a tag push GITHUB_REF_NAME is the tag; on workflow_dispatch it is the branch.
          if ("${env:GITHUB_REF_NAME}" -match '^v\d') {
            $ver = "${env:GITHUB_REF_NAME}".TrimStart("v")
          } else {
            $cargo = Select-String -Path Cargo.toml -Pattern '^version\s*=' | Select-Object -First 1
            $ver = ($cargo.Line -replace '.*"([^"]+)".*', '$1')
          }
          $name = "self-v$ver-${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path "staging/$name", "dist" | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/self.exe" "staging/$name/self.exe"
          if (Test-Path README.md) { Copy-Item README.md "staging/$name/" }
          if (Test-Path LICENSE)   { Copy-Item LICENSE   "staging/$name/" }
          Compress-Archive -Path "staging/$name" -DestinationPath "dist/$name.zip"
          $hash = (Get-FileHash "dist/$name.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  $name.zip`n" | Out-File -Encoding ascii -NoNewline "dist/$name.zip.sha256"

      - name: Upload release archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: archive-${{ matrix.target }}
          path: dist/
          if-no-files-found: error

      - name: Upload raw binary (for npm packaging)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: binary-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/self${{ matrix.ext }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3a. GitHub Release: gather archives, build combined checksums, publish,
  #     and attest build provenance for all release assets.
  #     This is the ONLY job with contents: write.
  #     Skipped on workflow_dispatch (dry-run).
  # ---------------------------------------------------------------------------
  github-release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write    # build-provenance attestations
      attestations: write # build-provenance attestations
    steps:
      - name: Download all archives
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          pattern: archive-*
          merge-multiple: true

      - name: Generate combined SHA256SUMS
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          files=( self-v*.tar.gz self-v*.zip )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::no release archives were downloaded"
            exit 1
          fi
          sha256sum "${files[@]}" > SHA256SUMS
          echo "Checksums:"
          cat SHA256SUMS

      - name: Attest release archives and SHA256SUMS
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/self-v*.tar.gz
            dist/self-v*.zip
            dist/SHA256SUMS

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          shopt -s nullglob
          gh release create "${GITHUB_REF_NAME}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes \
            self-v*.tar.gz self-v*.zip SHA256SUMS

  # ---------------------------------------------------------------------------
  # 3b. npm: place binaries, publish the FIVE platform packages, then main.
  #     Trusted publishing via OIDC -> id-token: write; provenance is automatic.
  #     Skipped on workflow_dispatch (dry-run).
  # ---------------------------------------------------------------------------
  npm-publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read # checkout the committed npm/ package skeletons
      id-token: write # OIDC token for npm trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node (>= 22.14 required for trusted publishing)
        uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Upgrade npm to >= 11.5.1 (trusted publishing floor)
        run: npm install -g npm@latest

      - name: Show tooling versions
        run: |
          node --version
          npm --version

      - name: Download platform binaries
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: binaries
          pattern: binary-*

      - name: Place binaries into platform packages
        shell: bash
        run: |
          set -euo pipefail
          place() {
            target="$1"; platform="$2"; ext="$3"
            src="binaries/binary-${target}/self${ext}"
            destdir="npm/platforms/${platform}/bin"
            if [ ! -f "${src}" ]; then
              echo "::error::missing built binary ${src}"
              exit 1
            fi
            mkdir -p "${destdir}"
            cp "${src}" "${destdir}/self${ext}"
            # upload-artifact drops the unix executable bit; restore it.
            if [ -z "${ext}" ]; then chmod +x "${destdir}/self"; fi
            echo "placed ${src} -> ${destdir}/self${ext}"
          }
          place x86_64-unknown-linux-gnu  linux-x64    ""
          place aarch64-unknown-linux-gnu linux-arm64  ""
          place x86_64-apple-darwin       darwin-x64   ""
          place aarch64-apple-darwin      darwin-arm64 ""
          place x86_64-pc-windows-msvc    windows-x64  ".exe"

      - name: Publish platform packages first, then main
        shell: bash
        run: |
          set -euo pipefail
          # Platform packages MUST land before the main package: an install
          # racing the publish would otherwise 404 on the optional deps.
          for p in linux-x64 linux-arm64 darwin-x64 darwin-arm64 windows-x64; do
            echo "== publishing @dean0x/self-${p} =="
            npm publish --access public "npm/platforms/${p}"
          done
          echo "== publishing @dean0x/self (main) =="
          npm publish --access public "npm/self"

  # ---------------------------------------------------------------------------
  # 3c. crates.io: trusted publishing via rust-lang/crates-io-auth-action.
  #     Skipped on workflow_dispatch (dry-run).
  # ---------------------------------------------------------------------------
  crates-publish:
    name: Publish to crates.io
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # OIDC token for crates.io trusted publishing
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: stable

      - name: Authenticate to crates.io (trusted publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5

      - name: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
        run: cargo publish --locked
