name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of the project is affected?
      options:
        - CLI commands
        - Install (npm)
        - Install (cargo)
        - Install (prebuilt binary)
        - Learning agents / templates
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `self --version`
      placeholder: "e.g. self 0.1.0"
    validations:
      required: true

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you see? Include any error messages or unexpected output.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Run `self init`
        2. ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: OS / environment
      description: e.g. macOS 14 arm64, Ubuntu 24.04 x86_64, Windows 11
    validations:
      required: true
